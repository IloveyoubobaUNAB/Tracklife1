<svg xmlns="http://www.w3.org/2000/svg" width="700" height="480" font-family="Segoe UI, Arial, sans-serif">
  <!-- Background -->
  <rect width="700" height="480" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <rect x="10" y="10" width="680" height="46" fill="#2C3E50" rx="6"/>
  <text x="350" y="40" font-size="16" font-weight="bold" fill="white" text-anchor="middle">C4 — Nivel 1: Contexto del Sistema · ANTES</text>

  <!-- Subtitle badge -->
  <rect x="270" y="64" width="160" height="24" fill="#E74C3C" rx="12"/>
  <text x="350" y="81" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Arquitectura Inicial</text>

  <!-- User box -->
  <rect x="270" y="110" width="160" height="100" fill="#3498DB" rx="8" stroke="#2980B9" stroke-width="2"/>
  <text x="350" y="152" font-size="26" text-anchor="middle">👤</text>
  <text x="350" y="174" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Usuario</text>
  <text x="350" y="192" font-size="11" fill="#D6EAF8" text-anchor="middle">[Paciente]</text>

  <!-- Arrow -->
  <line x1="350" y1="210" x2="350" y2="264" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="344,262 356,262 350,274" fill="#555"/>
  <text x="370" y="242" font-size="10" fill="#555">Usa</text>

  <!-- ViveBien App box -->
  <rect x="155" y="274" width="390" height="120" fill="#E8F4F8" rx="8" stroke="#E74C3C" stroke-width="2.5"/>
  <text x="350" y="302" font-size="15" font-weight="bold" fill="#C0392B" text-anchor="middle">ViveBien App</text>
  <text x="350" y="320" font-size="11" fill="#666" text-anchor="middle">[Android — Kotlin]</text>
  <line x1="195" y1="330" x2="505" y2="330" stroke="#ddd" stroke-width="1"/>
  <text x="350" y="348" font-size="10" fill="#888" text-anchor="middle">Aplicación móvil de seguimiento de salud</text>
  <text x="350" y="365" font-size="10" fill="#E74C3C" text-anchor="middle" font-weight="bold">Sin backend · Sin BD · Datos 100% hardcodeados</text>
  <text x="350" y="382" font-size="10" fill="#E74C3C" text-anchor="middle">Sin sistemas externos</text>

  <!-- Legend -->
  <rect x="30" y="420" width="640" height="44" fill="#FDECEA" rx="6" stroke="#E74C3C" stroke-width="1"/>
  <text x="350" y="438" font-size="11" fill="#C0392B" text-anchor="middle" font-weight="bold">⚠ Antipatrón: Big Ball of Mud</text>
  <text x="350" y="454" font-size="10" fill="#888" text-anchor="middle">Toda la lógica, datos y UI en los mismos archivos Composable</text>
</svg>
