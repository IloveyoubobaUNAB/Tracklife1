<svg xmlns="http://www.w3.org/2000/svg" width="780" height="560" font-family="Segoe UI, Arial, sans-serif">
  <rect width="780" height="560" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <rect x="10" y="10" width="760" height="46" fill="#2C3E50" rx="6"/>
  <text x="390" y="40" font-size="16" font-weight="bold" fill="white" text-anchor="middle">C4 — Nivel 2: Contenedores · ANTES</text>

  <rect x="296" y="64" width="188" height="24" fill="#E74C3C" rx="12"/>
  <text x="390" y="81" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Arquitectura Inicial — Big Ball of Mud</text>

  <!-- APK outer container -->
  <rect x="30" y="100" width="720" height="380" fill="#FDFEFE" rx="10" stroke="#BDC3C7" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="390" y="124" font-size="12" fill="#999" text-anchor="middle" font-style="italic">Aplicación Android (APK)</text>

  <!-- Single layer box -->
  <rect x="60" y="136" width="660" height="310" fill="#FDEDEC" rx="8" stroke="#E74C3C" stroke-width="2.5"/>
  <text x="390" y="162" font-size="13" font-weight="bold" fill="#C0392B" text-anchor="middle">UI Layer ÚNICO — Sin separación de capas</text>

  <!-- Files -->
  <!-- Row 1 -->
  <rect x="80" y="176" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="175" y="198" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">LoginScreen.kt</text>
  <text x="175" y="214" font-size="10" fill="#E74C3C" text-anchor="middle">lógica auth + UI + datos</text>
  <text x="175" y="226" font-size="10" fill="#888" text-anchor="middle">Constants.TEST_USER</text>

  <rect x="295" y="176" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="390" y="198" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">HomeScreen.kt</text>
  <text x="390" y="214" font-size="10" fill="#E74C3C" text-anchor="middle">UI + datos hardcodeados</text>
  <text x="390" y="226" font-size="10" fill="#888" text-anchor="middle">listOf(...) inline</text>

  <rect x="510" y="176" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="605" y="198" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">SaludScreen.kt</text>
  <text x="605" y="214" font-size="10" fill="#E74C3C" text-anchor="middle">UI + datos hardcodeados</text>
  <text x="605" y="226" font-size="10" fill="#888" text-anchor="middle">2 tabs vacíos</text>

  <!-- Row 2 -->
  <rect x="80" y="246" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="175" y="268" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">ActividadScreen.kt</text>
  <text x="175" y="284" font-size="10" fill="#E74C3C" text-anchor="middle">UI + datos hardcodeados</text>
  <text x="175" y="296" font-size="10" fill="#888" text-anchor="middle">sin interacción</text>

  <rect x="295" y="246" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="390" y="268" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">CitasScreen.kt</text>
  <text x="390" y="284" font-size="10" fill="#E74C3C" text-anchor="middle">calendario estático</text>
  <text x="390" y="296" font-size="10" fill="#888" text-anchor="middle">sin persistencia</text>

  <rect x="510" y="246" width="190" height="52" fill="#FDFEFE" rx="6" stroke="#E74C3C" stroke-width="1.5"/>
  <text x="605" y="268" font-size="11" font-weight="bold" fill="#333" text-anchor="middle">PerfilScreen.kt</text>
  <text x="605" y="284" font-size="10" fill="#E74C3C" text-anchor="middle">datos hardcodeados</text>
  <text x="605" y="296" font-size="10" fill="#888" text-anchor="middle">nombre fijo</text>

  <!-- Row 3 -->
  <rect x="80" y="316" width="190" height="52" fill="#FEF9E7" rx="6" stroke="#F39C12" stroke-width="1.5"/>
  <text x="175" y="338" font-size="11" font-weight="bold" fill="#D35400" text-anchor="middle">Constants.kt</text>
  <text x="175" y="354" font-size="10" fill="#E74C3C" text-anchor="middle">⚠ credenciales texto plano</text>
  <text x="175" y="366" font-size="10" fill="#888" text-anchor="middle">TEST_USER, TEST_PASS</text>

  <rect x="295" y="316" width="190" height="52" fill="#FEF9E7" rx="6" stroke="#F39C12" stroke-width="1.5"/>
  <text x="390" y="338" font-size="11" font-weight="bold" fill="#D35400" text-anchor="middle">NavGraph.kt</text>
  <text x="390" y="354" font-size="10" fill="#E74C3C" text-anchor="middle">nav + sealed class inline</text>
  <text x="390" y="366" font-size="10" fill="#888" text-anchor="middle">responsabilidades mezcladas</text>

  <!-- Absent elements -->
  <rect x="510" y="316" width="190" height="52" fill="#F2F3F4" rx="6" stroke="#BDC3C7" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="605" y="344" font-size="11" fill="#999" text-anchor="middle" font-style="italic">Sin ViewModels</text>
  <text x="605" y="360" font-size="11" fill="#999" text-anchor="middle" font-style="italic">Sin Repository</text>

  <!-- Bottom legend -->
  <rect x="30" y="490" width="720" height="54" fill="#FDECEA" rx="6" stroke="#E74C3C" stroke-width="1"/>
  <text x="390" y="510" font-size="11" fill="#C0392B" text-anchor="middle" font-weight="bold">AUSENTE: ViewModels · Repository · UseCase · Room · Hilt DI · DataStore</text>
  <text x="390" y="528" font-size="10" fill="#888" text-anchor="middle">Sin almacenamiento externo · Sin APIs · Sin inyección de dependencias</text>
</svg>
