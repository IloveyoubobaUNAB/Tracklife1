<svg xmlns="http://www.w3.org/2000/svg" width="780" height="520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="780" height="520" fill="#F8F9FA" rx="8"/>

  <!-- Title -->
  <rect x="10" y="10" width="760" height="46" fill="#2C3E50" rx="6"/>
  <text x="390" y="40" font-size="16" font-weight="bold" fill="white" text-anchor="middle">C4 — Nivel 1: Contexto del Sistema · DESPUÉS</text>

  <rect x="286" y="64" width="208" height="24" fill="#27AE60" rx="12"/>
  <text x="390" y="81" font-size="11" fill="white" text-anchor="middle" font-weight="bold">Arquitectura Mejorada — Monolito Modular</text>

  <!-- User box -->
  <rect x="310" y="110" width="160" height="100" fill="#3498DB" rx="8" stroke="#2980B9" stroke-width="2"/>
  <text x="390" y="152" font-size="26" text-anchor="middle">👤</text>
  <text x="390" y="174" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Usuario</text>
  <text x="390" y="192" font-size="11" fill="#D6EAF8" text-anchor="middle">[Paciente]</text>

  <!-- Arrow down to app -->
  <line x1="390" y1="210" x2="390" y2="258" stroke="#555" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="384,256 396,256 390,268" fill="#555"/>
  <text x="408" y="238" font-size="10" fill="#555">Interactúa</text>

  <!-- ViveBien App box -->
  <rect x="150" y="268" width="280" height="170" fill="#EBF5FB" rx="8" stroke="#27AE60" stroke-width="2.5"/>
  <text x="290" y="294" font-size="14" font-weight="bold" fill="#1D8348" text-anchor="middle">ViveBien App</text>
  <text x="290" y="312" font-size="11" fill="#666" text-anchor="middle">[Android — Kotlin + Compose]</text>
  <line x1="180" y1="320" x2="400" y2="320" stroke="#ddd" stroke-width="1"/>
  <text x="290" y="338" font-size="10" fill="#555" text-anchor="middle">Seguimiento de salud personal:</text>
  <text x="290" y="355" font-size="10" fill="#555" text-anchor="middle">· Actividad física · Signos vitales</text>
  <text x="290" y="372" font-size="10" fill="#555" text-anchor="middle">· Medicación · Citas médicas</text>
  <text x="290" y="389" font-size="10" fill="#555" text-anchor="middle">· Perfil personal</text>
  <text x="290" y="407" font-size="9" fill="#27AE60" text-anchor="middle">MVVM + Clean Arch + Hilt + Room</text>
  <text x="290" y="422" font-size="9" fill="#27AE60" text-anchor="middle">KSP + DataStore + StateFlow</text>

  <!-- Arrow to Storage -->
  <line x1="430" y1="353" x2="498" y2="353" stroke="#27AE60" stroke-width="2"/>
  <polygon points="496,347 508,353 496,359" fill="#27AE60"/>
  <text x="460" y="346" font-size="9" fill="#27AE60" text-anchor="middle">persiste en</text>

  <!-- Storage box -->
  <rect x="510" y="268" width="200" height="170" fill="#E9F7EF" rx="8" stroke="#27AE60" stroke-width="2"/>
  <text x="610" y="294" font-size="13" font-weight="bold" fill="#1D8348" text-anchor="middle">Almacenamiento Local</text>
  <line x1="530" y1="302" x2="690" y2="302" stroke="#ddd" stroke-width="1"/>

  <!-- Room section -->
  <rect x="530" y="312" width="160" height="56" fill="#D5F5E3" rx="5" stroke="#27AE60" stroke-width="1"/>
  <text x="610" y="330" font-size="11" font-weight="bold" fill="#1D8348" text-anchor="middle">Room Database</text>
  <text x="610" y="346" font-size="10" fill="#555" text-anchor="middle">4 tablas: activities,</text>
  <text x="610" y="360" font-size="10" fill="#555" text-anchor="middle">appointments, medications, vital_signs</text>

  <!-- DataStore section -->
  <rect x="530" y="376" width="160" height="52" fill="#D5F5E3" rx="5" stroke="#27AE60" stroke-width="1"/>
  <text x="610" y="394" font-size="11" font-weight="bold" fill="#1D8348" text-anchor="middle">DataStore Preferences</text>
  <text x="610" y="410" font-size="10" fill="#555" text-anchor="middle">auth_prefs · profile_prefs</text>
  <text x="610" y="424" font-size="10" fill="#555" text-anchor="middle">sesión + configuración</text>

  <!-- Bottom legend -->
  <rect x="10" y="460" width="760" height="44" fill="#EAFAF1" rx="6" stroke="#27AE60" stroke-width="1"/>
  <text x="390" y="478" font-size="11" fill="#1D8348" text-anchor="middle" font-weight="bold">✓ Sin servidor externo — todo persiste localmente</text>
  <text x="390" y="495" font-size="10" fill="#555" text-anchor="middle">Los datos sobreviven al cierre de la app · Arquitectura lista para agregar backend remoto</text>
</svg>
